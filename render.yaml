services:
  - type: web
    name: gcc-car-value-api
    runtime: docker
    repo: https://github.com/saarimabdulrahman-hub/gcc-car-value.git
    branch: feature-url-valuation
    rootDir: .
    dockerfilePath: docker/Dockerfile.api
    healthCheckPath: /v1/health
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gcc-car-value-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: gcc-car-value-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO

databases:
  - name: gcc-car-value-db
    plan: free
