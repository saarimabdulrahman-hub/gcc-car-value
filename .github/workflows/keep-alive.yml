name: Keep Render API Alive

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health endpoint
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://gcc-car-value.onrender.com/v1/health || true
